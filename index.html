  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      background: #08090C;
      min-height: 100vh;
    }
    #root {
      background: #08090C;
      min-height: 100vh;
    }
    /* Boot loader. Target paint under 200ms. Removes itself on window load (3s hard fallback). */
    #loca-boot {
      position: fixed;
      inset: 0;
      background: #08090C;
      display: grid;
      place-items: center;
      z-index: 9999;
      transition: opacity 240ms ease;
    }
    .loca-boot__stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .loca-boot__mark {
      width: 56px;
      height: 56px;
      animation: loca-boot-rise 600ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes loca-boot-rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .loca-boot__scan {
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: 0;
      animation: loca-boot-fade 360ms ease 220ms forwards;
    }
    .loca-boot__scan span {
      display: block;
      width: 12px;
      height: 4px;
      border-radius: 1px;
      background: rgba(45, 127, 240, 0.14);
      transform-origin: center;
      animation: loca-scan 1400ms cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    .loca-boot__scan span:nth-child(1) { animation-delay: 0ms; }
    .loca-boot__scan span:nth-child(2) { animation-delay: 110ms; }
    .loca-boot__scan span:nth-child(3) { animation-delay: 220ms; }
    .loca-boot__scan span:nth-child(4) { animation-delay: 330ms; }
    .loca-boot__scan span:nth-child(5) { animation-delay: 440ms; }
    .loca-boot__scan span:nth-child(6) { animation-delay: 550ms; }
    .loca-boot__scan span:nth-child(7) { animation-delay: 660ms; }
    @keyframes loca-scan {
      0%, 100% { background: rgba(45, 127, 240, 0.14); transform: scaleY(1); }
      20%      { background: #2D7FF0; transform: scaleY(1.7); }
      60%      { background: rgba(45, 127, 240, 0.14); transform: scaleY(1); }
    }
    .loca-boot__caption {
      font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.32em;
      color: #4A5060;
      text-transform: uppercase;
      opacity: 0;
      animation: loca-boot-fade 360ms ease 340ms forwards;
    }
    @keyframes loca-boot-fade {
      to { opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .loca-boot__mark,
      .loca-boot__scan,
      .loca-boot__caption { animation: none; opacity: 1; }
      .loca-boot__scan span { animation: none; }
      .loca-boot__scan span:nth-child(4) { background: #2D7FF0; }
    }
  </style>

<body>
  <div id="loca-boot" aria-hidden="true">
    <div class="loca-boot__stage">
      <img src="/brand/loca-mark.svg" alt="" class="loca-boot__mark" width="56" height="56" draggable="false" />
      <div class="loca-boot__scan" role="presentation">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="loca-boot__caption">Locappoint</div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    // Hide boot loader when React signals ready via window.__locaBootReady().
    // Hard fallback at 3s in case the signal never fires.
    (function () {
      var boot = document.getElementById('loca-boot');
      if (!boot) return;
      var done = false;
      function remove() {
        if (done) return;
        done = true;
        boot.style.opacity = '0';
        setTimeout(function () { boot.remove(); }, 240);
      }
      window.__locaBootReady = remove;
      // Fallback: if React never signals ready (real bug OR very slow chunk load),
      // dismiss after 30s. Vite dev cold loads can exceed 15s on Windows.
      setTimeout(function () {
        if (done) return;
        console.warn('[loca-boot] Signal not received after 30s. Force-dismissing loader.');
        remove();
      }, 30000);
    })();
  </script>

  <script type="module" src="/src/main.jsx"></script>
</body>
